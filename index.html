<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Эдуард Злобин — Чат</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="tg-container">
        <div class="tg-header">
            <div class="avatar">ЭЗ</div>
            <div class="user-info">
                <span class="user-name">Эдуард Злобин</span>
                <span class="user-status">был(а) недавно</span>
            </div>
        </div>
        
        <div id="chat-box" class="tg-chat-box"></div>
        
        <div class="tg-input-area">
            <input type="text" id="user-input" placeholder="Сообщение..." autocomplete="off">
            <button id="send-btn">➤</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
